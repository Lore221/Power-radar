modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="architectury"
type="required"
versionRange="[${architectury_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="create"
type="required"
versionRange="[6.0.10,6.1.0)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="electroenergetics"
type="required"
versionRange="[${electroenergetics_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="createbigcannons"
type="required"
versionRange="[${create_big_cannons_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="ritchiesprojectilelib"
type="required"
versionRange="[${ritchies_projectile_lib_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="aeronautics"
type="optional"
versionRange="[${aeronautics_version},)"
ordering="AFTER"
side="BOTH"
